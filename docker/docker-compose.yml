services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - KMP_DUPLICATE_LIB_OK=TRUE
    depends_on:
      - mlflow

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dashboard
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.15.1
    ports:
      - "5001:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow

volumes:
  mlflow_data: